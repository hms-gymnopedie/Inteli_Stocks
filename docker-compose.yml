services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    env_file: .env
    volumes:
      - intelistock-data:/data/intelistock
    ports:
      # Expose API only on localhost — do not bind to 0.0.0.0.
      - "127.0.0.1:3001:3001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    depends_on:
      server:
        condition: service_healthy
    ports:
      # Match the dev port users are used to.
      - "127.0.0.1:5180:80"
    restart: unless-stopped

volumes:
  intelistock-data:
    driver: local
